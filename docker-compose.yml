version: '3.8'
services:
  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
  server:
    build: ./server
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/mernapp
      - PORT=5000
    depends_on:
      - mongodb
    restart: unless-stopped
  client:
    build: ./client
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped
volumes:
  mongo-data: